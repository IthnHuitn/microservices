global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'security-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['security:5000']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'flask_http_request.*'
        action: keep

  - job_name: 'uploader-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['uploader:5001']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'flask_http_request.*'
        action: keep

  - job_name: 'minio-service'
    metrics_path: '/minio/v2/metrics/cluster'
    basic_auth:
      username: 'minioadmin'
      password: 'minioadmin'
    static_configs:
      - targets: ['minio:9000']

  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:80']